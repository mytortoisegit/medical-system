# ==================== 应用配置 ====================
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: medical-system
  profiles:
    active: dev

  # ==================== 日期格式配置 ====================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  # ==================== 文件上传配置 ====================
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ==================== MyBatis-Plus配置 ====================
mybatis-plus:
  # 实体扫描包
  type-aliases-package: com.medical.model.entity
  # Mapper XML路径
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      # 主键类型：ASSIGN_ID（雪花算法）
      id-type: assign_id
      # 逻辑删除字段
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 缓存
    cache-enabled: false

# ==================== JWT配置 ====================
jwt:
  # JWT签名密钥（生产环境请使用复杂密钥并妥善保管）
  secret: medical-system-jwt-secret-key-2024-tcm
  # Token过期时间（小时）
  expiration: 24

# ==================== Knife4j配置 ====================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.medical.admin.controller
